target-version = "py311"
line-length = 88
src = ["src", "test", "benchmarks"]

exclude = [
    ".git",
    ".pytest_cache",
    ".venv",
    "__pycache__",
    "build",
    "dist",
    "docs",
]

[lint]
select = [
    "E",
    "F",
    "I",
    "UP",
]

[lint.per-file-ignores]
"__init__.py" = ["F401"]

[format]
quote-style = "double"
indent-style = "space"
line-ending = "auto"
docstring-code-format = false
